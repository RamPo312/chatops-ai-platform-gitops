apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: monitoring-custom-alerts
  namespace: monitoring
  labels:
    release: monitoring-dev
spec:
  groups:
    - name: infrastructure-alerts
      rules:
        - alert: NodeCPUHigh
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on node"
            description: "Node {{ $labels.instance }} CPU usage is above 80% for 5 minutes."

        - alert: NodeMemoryHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on node"
            description: "Node {{ $labels.instance }} memory usage is above 80% for 5 minutes."

    - name: kubernetes-alerts
      rules:
        - alert: PodRestartingTooMuch
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting too much"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in 10 minutes."

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Pod not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for 10 minutes."

    - name: rollout-alerts
      rules:
        - alert: RolloutReplicasMismatch
          expr: |
            argo_rollouts_info
            and
            (
              argo_rollout_status_replicas_available < argo_rollout_spec_replicas
            )
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Rollout replicas mismatch"
            description: "Rollout {{ $labels.namespace }}/{{ $labels.rollout }} does not have enough available replicas."

        - alert: RolloutDegraded
          expr: |
            max by(namespace, rollout) (
              argo_rollout_info
            ) and on(namespace, rollout)
            (
              argo_rollout_status_phase{phase=~"Degraded|Error"} == 1
            )
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Rollout degraded"
            description: "Rollout {{ $labels.namespace }}/{{ $labels.rollout }} is in degraded or error phase."
